<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Farmer Login - Pineapple Detection</title>
    <style>
        /* General body styling */
        body {
            background-color: #fff7d4;
            font-family: Arial, sans-serif;
            margin: 0;
            padding-top: 80px; /* Prevents overlap with the fixed navbar */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Navigation bar styling */
        nav {
            background-color: #FFC300;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 999;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #050605;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-end;
            flex-grow: 1;
            margin-left: auto;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            text-decoration: none;
            color: #040504;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #ffb300;
        }

        /* Auth links styling */
        .auth-links {
            margin-left: 10px;
        }

        .auth-links a {
            background-color: #FF4E50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .auth-links a:hover {
            background-color: #228B22;
        }

        /* Auth section styling */
        .auth-section {
            background-color: #FFC300;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .auth-section h2 {
            font-size: 2rem;
            color: #0c0c0c;
            margin-bottom: 20px;
        }

        .auth-section form input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }

        .auth-section input[type="submit"] {
            background-color: #228B22;
            color: white;
            cursor: pointer;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-size: 1.2rem;
        }

        .auth-section input[type="submit"]:hover {
            background-color: #0d0d0c;
        }

        /* Add responsiveness for mobile */
        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            
            nav ul li {
                margin-left: 1rem;
            }
            
            .auth-section {
                padding: 20px;
                box-shadow: none;
            }
        }

    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">Pineapple Ripeness Detection</div>
        <ul>
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('about') }}">About</a></li>
            <li><a href="{{ url_for('blogs') }}">Blogs</a></li>
            <li><a href="{{ url_for('contact') }}">Contact</a></li>  
        </ul>
        <div class="auth-links">
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Register</a>
        </div>
    </nav>

    <!-- Auth Section -->
    <div class="auth-section">
        <h2>Farmer Login</h2>
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="submit" value="Login">
        </form>
        <p>Don't have an account? <a href="/register">Register here</a></p>
    </div>

</body>
</html>
